[data]
backtest_cache_dir = "c:/backtest_cache"
regime_cache_dir = "c:/alpha_cache"
timeframe = "15m"
symbols = ["BTC_USDT", "ETH_USDT"]

[execution]
slippage_bps = 5.0
taker_fee_rate = 0.0006
maker_fee_rate = 0.0002
exec_mode = "taker"

[walk_forward]
years = [2020, 2021, 2022, 2023, 2024]
weights_grid = [0.7, 0.9, 1.0]
v2_param_samples = 20

[shock_model]
horizon_bars = 6
label_threshold = 0.08
neg_ratio = 2.0
ridge_l2 = 5.0

[risk]
portfolio_slots = 1
risk_per_trade = 0.015
stop_loss_pct_trend = 0.03
stop_loss_pct_shock = 0.05
enable_vol_targeting = true
vol_ratio_floor = 0.9
vol_ratio_cap = 2.2
vol_ratio_power = 1.0
dd_threshold_1 = 0.05
dd_threshold_2 = 0.10
dd_scale_1 = 0.7
dd_scale_2 = 0.4
leverage_mult = 1.0
notional_cap = 1200.0

[prop]
initial_capital = 5000.0
daily_dd_pct = 0.05
max_loss_pct = 0.10
record_equity_every_bar = true
